name: Build HandFab APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Backup our lib/ folder
        run: cp -r lib /tmp/handfab_lib

      - name: Scaffold Android files only
        run: flutter create --project-name handfab_app --platforms android .

      - name: Restore our lib/ folder
        run: |
          rm -rf lib
          cp -r /tmp/handfab_lib lib

      - name: Restore our AndroidManifest
        run: cp android/app/src/main/AndroidManifest.xml /tmp/manifest_backup.xml || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HandFab-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
